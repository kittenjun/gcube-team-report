name: Publish GCUBE report

on:
  schedule:
    # 매일 22:00 UTC = 07:00 KST(다음날). 시간 조정은 cron 값을 바꾸세요.
    - cron: '0 22 * * *'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: publish-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate index.html
        env:
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
          AZDO_ORG: data-alliance-com
          AZDO_PROJECT: GCUBE
          AZDO_MEMBERS: '조광현,권상준,장호진,임채윤,구지연'
        run: python generate_report.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "Auto: GCUBE report $(date -u +%Y-%m-%d)"
            git push
          fi
